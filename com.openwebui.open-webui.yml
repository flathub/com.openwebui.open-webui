id: com.openwebui.open-webui
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
rename-desktop-file: open-webui.desktop

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

modules:
  - name: open-webui
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node24/bin
      env:
        XDG_CACHE_HOME: /run/build/open-webui/flatpak-node/cache
        npm_config_cache: /run/build/open-webui/flatpak-node/npm-cache
    build-commands:
      - |
        ln -s $XDG_CACHE_HOME/node-gyp $HOME/.electron-gyp
        npm install --offline
      - npm run build
      - patch -i asar.patch node_modules/app-builder-lib/out/asar/asarUtil.js
      - npx electron-builder --dir
      - mv dist/linux*-unpacked /app/main
      - ar x open-webui*.deb
      - tar xf data.tar.xz
      - mv usr/share/applications /app/share
      - desktop-file-edit --set-key Exec --set-value "run.sh %U" --set-key Icon --set-value
        com.openwebui.open-webui /app/share/applications/open-webui.desktop
      - install -Dm644  build/icon.png /app/share/icons/hicolor/512x512/apps/com.openwebui.open-webui.png
      - install -Dm644 -t /app/share/metainfo build/com.openwebui.open-webui.metainfo.xml
      - install -Dm755 -t /app/bin run.sh
    sources:
      - type: git
        url: https://github.com/open-webui/desktop.git
        tag: v0.0.18
        commit: 64c399738e21b3665c328b45887b13dbcf064a1d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/open-webui/desktop/releases/latest
          tag-query: .tag_name
      - generated-sources.json
      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/main/open-webui "$@"
      - type: file
        url: https://github.com/open-webui/desktop/releases/download/v0.0.18/open-webui_amd64.deb
        sha256: 7f1a0cec397a77f81e119d4675f7aa9a00526e4fa51e03cb6824de73711da1cd
        x-checker-data:
          type: json
          url: https://api.github.com/repos/open-webui/desktop/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="open-webui_amd64.deb") | .browser_download_url
      - type: file
        path: asar.patch
